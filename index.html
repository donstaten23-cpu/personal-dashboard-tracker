    var pills = document.getElementById("wkPills").querySelectorAll(".pill");
    for (var i = 0; i < pills.length; i++) {
      pills[i].addEventListener("click", function (e) { activeCat = e.currentTarget.getAttribute("data-cat"); renderPills(); });
    }
  }

  function getSortedItems() {
    var copy = data.items.slice();
    if (sortBy === "date") {
      copy.sort(function (a, b) { return (b.date || "0000").localeCompare(a.date || "0000"); });
    } else {
      var order = WORKOUT_CATEGORIES.map(function (c) { return c.id; });
      copy.sort(function (a, b) {
        var d = order.indexOf(a.category) - order.indexOf(b.category);
        if (d !== 0) return d;
        return (b.date || "0000").localeCompare(a.date || "0000");
      });
    }
    return copy;
  }

  function renderLiftsBlock(item) {
    var lifts = item.lifts || [];
    var liftRows = lifts.map(function (l) {
      if (editingLiftItemId === item.id && editingLiftId === l.id) {
        var ef = editingLiftForm;
        return '<div class="weight-log-row" style="flex-wrap:wrap;">' +
          '<input class="edit-input grow" style="min-width:80px;" data-lift-edit="name" value="' + escapeHtml(ef.name) + '" />' +
          '<input class="edit-input amt" type="number" min="0" step="0.5" data-lift-edit="weight" placeholder="Lbs" value="' + escapeHtml(ef.weight) + '" />' +
          '<input class="edit-input amt" type="number" min="0" data-lift-edit="sets" placeholder="Sets" value="' + escapeHtml(ef.sets) + '" />' +
          '<input class="edit-input amt" type="number" min="0" data-lift-edit="reps" placeholder="Reps" value="' + escapeHtml(ef.reps) + '" />' +
          '<button class="icon-btn" data-action="save-lift" style="color:' + accent + ';">\u2713</button>' +
          '<button class="icon-btn" data-action="cancel-lift-edit">\u2715</button>' +
        "</div>";
      }
      var bits = [];
      if (l.weight !== "" && l.weight != null) bits.push(l.weight + " lbs");
      if (l.sets !== "" && l.sets != null) bits.push(l.sets + " sets");
      if (l.reps !== "" && l.reps != null) bits.push(l.reps + " reps");
      return '<div class="weight-log-row"><span style="color:#EDEAE3;">' + escapeHtml(l.name) + '</span><span class="mono" style="color:' + accent + ';">' + bits.join(" \u00D7 ") + '</span>' +
        '<span style="display:flex;gap:4px;flex-shrink:0;">' +
        '<button class="icon-btn" data-action="edit-lift" data-item="' + item.id + '" data-lift="' + l.id + '">\u270E</button>' +
        '<button class="icon-btn" data-action="delete-lift" data-item="' + item.id + '" data-lift="' + l.id + '">\u2715</button>' +
        "</span></div>";
    }).join("");
    return '<div style="margin-top:10px;padding-top:10px;border-top:1px solid #2A313A;">' +
      (liftRows || '<div style="color:#8A919C;font-size:12px;margin-bottom:6px;">No lifts logged for this session yet.</div>') +
      '<div class="row-gap" style="margin-top:8px;">' +
        '<input class="form-input" style="width:auto;flex:1;min-width:100px;" placeholder="Lift name" data-lift-field="name" data-item="' + item.id + '" />' +
        '<input class="form-input" style="width:80px;" type="number" min="0" step="0.5" placeholder="Lbs" data-lift-field="weight" data-item="' + item.id + '" />' +
        '<input class="form-input" style="width:70px;" type="number" min="0" placeholder="Sets" data-lift-field="sets" data-item="' + item.id + '" />' +
        '<input class="form-input" style="width:70px;" type="number" min="0" placeholder="Reps" data-lift-field="reps" data-item="' + item.id + '" />' +
        '<button class="small-btn" style="background:' + accent + ';flex-shrink:0;" data-action="add-lift" data-item="' + item.id + '">+</button>' +
      "</div>" +
    "</div>";
  }


  function renderList() {
    var sorted = getSortedItems();
    document.getElementById("wkEntryCount").textContent = data.items.length + (data.items.length === 1 ? " workout" : " workouts");
    var listEl = document.getElementById("wkList");
    if (sorted.length === 0) {
      listEl.innerHTML = '<div class="empty-state">Nothing logged yet. Add your first workout below and start a streak.</div>';
      return;
    }
    listEl.innerHTML = sorted.map(function (item) {
      var cat = categoryById(WORKOUT_CATEGORIES, item.category);
      if (item.id === editRowId) {
        var f = editRowForm;
        return '<div class="item-row"><div class="item-edit">' +
          '<div class="edit-line">' +
          '<select class="edit-select" data-edit="category">' + WORKOUT_CATEGORIES.map(function (c) { return '<option value="' + c.id + '"' + (c.id === f.category ? " selected" : "") + ">" + escapeHtml(c.label) + "</option>"; }).join("") + "</select>" +
          '<input class="edit-input grow" data-edit="name" placeholder="Name" value="' + escapeHtml(f.name) + '" />' +
          '<input class="edit-input date" type="date" data-edit="date" value="' + escapeHtml(f.date) + '" />' +
          "</div>" +
          '<div class="edit-line">' +
          '<input class="edit-input amt" type="number" min="0" data-edit="duration" placeholder="Minutes" value="' + escapeHtml(f.duration) + '" />' +
          '<input class="edit-input grow" data-edit="notes" placeholder="Notes" value="' + escapeHtml(f.notes) + '" />' +
          (editRowError ? '<span class="error-text">' + escapeHtml(editRowError) + "</span>" : "") +
          '<button class="icon-btn" data-action="save-row" style="color:' + accent + ';">\u2713</button>' +
          '<button class="icon-btn" data-action="cancel-row">\u2715</button>' +
          "</div></div></div>";
      }
      var expanded = expandedIds.has(item.id);
      var lifts = item.lifts || [];
      var liftSummary = lifts.length > 0 ? lifts.length + (lifts.length === 1 ? " lift logged" : " lifts logged") : "no lifts logged";
      var displayRow = '<div class="item-display">' +
        '<span class="item-bar" style="background:' + cat.color + ';"></span>' +
        '<span class="item-glyph" style="color:' + cat.color + ';">' + cat.glyph + "</span>" +
        '<div class="item-main"><div class="item-name">' + escapeHtml(item.name) + "</div>" +
        '<div class="item-sub">' + formatDateShort(item.date) + (item.duration !== "" && item.duration != null ? " \u00B7 " + item.duration + " min" : "") + " \u00B7 " + liftSummary + (item.notes ? " \u00B7 " + escapeHtml(item.notes) : "") + "</div></div>" +
        '<div class="item-actions">' +
        '<button class="icon-btn" data-action="toggle-expand" data-id="' + item.id + '">' + (expanded ? "\u25B4" : "\u25BE") + "</button>" +
        '<button class="icon-btn" data-action="edit" data-id="' + item.id + '">\u270E</button>' +
        '<button class="icon-btn" data-action="delete" data-id="' + item.id + '">\u2715</button></div>' +
        "</div>";
      var liftsBlock = expanded ? renderLiftsBlock(item) : "";
      return '<div class="item-row">' + displayRow + liftsBlock + "</div>";
    }).join("");
  }

  function renderFooter() {
    var totalMinutes = data.items.reduce(function (s, it) { return s + (Number(it.duration) || 0); }, 0);
    document.getElementById("wkFooterTotal").textContent = data.items.length + " workouts" + (totalMinutes > 0 ? " \u00B7 " + totalMinutes + " min" : "");
  }

  function renderDynamic() { renderStreak(); renderWeight(); renderGauge(); renderChips(); renderList(); renderFooter(); }

  function resetForm() {
    document.getElementById("wkName").value = "";
    document.getElementById("wkDate").value = todayISO();
    document.getElementById("wkDuration").value = "";
    document.getElementById("wkNotes").value = "";
    document.getElementById("wkFormError").textContent = "";
  }

  function handleAdd() {
    var name = document.getElementById("wkName").value.trim();
    var dateVal = document.getElementById("wkDate").value;
    var durationVal = document.getElementById("wkDuration").value;
    var notesVal = document.getElementById("wkNotes").value;
    var errEl = document.getElementById("wkFormError");
    if (!name) { errEl.textContent = "Give it a name first."; return; }
    errEl.textContent = "";
    var newItem = { id: uid(), category: activeCat, name: name, date: dateVal, duration: durationVal === "" ? "" : Number(durationVal), notes: notesVal, lifts: [] };
    data.items.push(newItem);
    expandedIds.add(newItem.id);
    save();
    resetForm();
    renderDynamic();
  }

  function toggleExpand(id) {
    if (expandedIds.has(id)) {
      expandedIds.delete(id);
      if (editingLiftItemId === id) { editingLiftItemId = null; editingLiftId = null; }
    } else {
      expandedIds.add(id);
    }
    renderList();
  }

  function handleAddLift(itemId) {
    var nameEl = document.querySelector('[data-lift-field="name"][data-item="' + itemId + '"]');
    var weightEl = document.querySelector('[data-lift-field="weight"][data-item="' + itemId + '"]');
    var setsEl = document.querySelector('[data-lift-field="sets"][data-item="' + itemId + '"]');
    var repsEl = document.querySelector('[data-lift-field="reps"][data-item="' + itemId + '"]');
    if (!nameEl) return;
    var name = nameEl.value.trim();
    if (!name) { nameEl.focus(); return; }
    var item = data.items.find(function (it) { return it.id === itemId; });
    if (!item) return;
    if (!item.lifts) item.lifts = [];
    item.lifts.push({
      id: uid(),
      name: name,
      weight: weightEl.value === "" ? "" : Number(weightEl.value),
      sets: setsEl.value === "" ? "" : Number(setsEl.value),
      reps: repsEl.value === "" ? "" : Number(repsEl.value)
    });
    save();
    renderList();
  }
  function handleDeleteLift(itemId, liftId) {
    var item = data.items.find(function (it) { return it.id === itemId; });
    if (!item) return;
    item.lifts = (item.lifts || []).filter(function (l) { return l.id !== liftId; });
    if (editingLiftItemId === itemId && editingLiftId === liftId) { editingLiftItemId = null; editingLiftId = null; }
    save();
    renderList();
  }

  function startLiftEdit(itemId, liftId) {
    var item = data.items.find(function (it) { return it.id === itemId; });
    if (!item) return;
    var lift = (item.lifts || []).find(function (l) { return l.id === liftId; });
    if (!lift) return;
    editingLiftItemId = itemId;
    editingLiftId = liftId;
    editingLiftForm = {
      name: lift.name,
      weight: lift.weight === "" || lift.weight == null ? "" : String(lift.weight),
      sets: lift.sets === "" || lift.sets == null ? "" : String(lift.sets),
      reps: lift.reps === "" || lift.reps == null ? "" : String(lift.reps)
    };
    renderList();
  }
  function cancelLiftEdit() {
    editingLiftItemId = null;
    editingLiftId = null;
    renderList();
  }
  function saveLiftEdit() {
    var item = data.items.find(function (it) { return it.id === editingLiftItemId; });
    if (!item || !editingLiftForm.name || !editingLiftForm.name.trim()) { cancelLiftEdit(); return; }
    item.lifts = (item.lifts || []).map(function (l) {
      if (l.id !== editingLiftId) return l;
      return {
        id: l.id,
        name: editingLiftForm.name,
        weight: editingLiftForm.weight === "" ? "" : Number(editingLiftForm.weight),
        sets: editingLiftForm.sets === "" ? "" : Number(editingLiftForm.sets),
        reps: editingLiftForm.reps === "" ? "" : Number(editingLiftForm.reps)
      };
    });
    save();
    editingLiftItemId = null;
    editingLiftId = null;
    renderList();
  }

  function startRowEdit(id) {
    var item = data.items.find(function (it) { return it.id === id; });
    if (!item) return;
    if (editingLiftItemId === id) { editingLiftItemId = null; editingLiftId = null; }
    editRowId = id;
    editRowForm = {
      category: item.category, name: item.name, date: item.date,
      duration: item.duration === "" || item.duration == null ? "" : String(item.duration),
      notes: item.notes || ""
    };
    editRowError = "";
    renderList();
  }
  function cancelRowEdit() { editRowId = null; editRowError = ""; renderList(); }
  function saveRowEdit() {
    if (!editRowForm.name || !editRowForm.name.trim()) { editRowError = "Needs a name."; renderList(); return; }
    data.items = data.items.map(function (it) {
      if (it.id !== editRowId) return it;
      return Object.assign({}, it, editRowForm, {
        duration: editRowForm.duration === "" ? "" : Number(editRowForm.duration)
      });
    });
    save();
    editRowId = null;
    editRowError = "";
    renderDynamic();
  }
  function handleDelete(id) {
    data.items = data.items.filter(function (it) { return it.id !== id; });
    expandedIds.delete(id);
    if (editingLiftItemId === id) { editingLiftItemId = null; editingLiftId = null; }
    save();
    if (editRowId === id) editRowId = null;
    renderDynamic();
  }
  function handleResetAll() {
    var btn = document.getElementById("wkResetBtn");
    if (!confirmReset) {
      confirmReset = true;
      btn.textContent = "Click again to clear everything";
      btn.style.color = "#FF8A5C";
      setTimeout(function () { confirmReset = false; if (document.getElementById("wkResetBtn")) { btn.textContent = "Clear this tab"; btn.style.color = "#8A919C"; } }, 4000);
      return;
    }
    data = { weeklyGoal: "", items: [], bodyWeightLog: [] };
    save();
    editRowId = null;
    expandedIds.clear();
    editingLiftItemId = null;
    editingLiftId = null;
    confirmReset = false;
    resetForm();
    renderDynamic();
  }

  document.getElementById("wkLogWeightBtn").addEventListener("click", handleLogWeight);
  document.getElementById("wkWeightDraft").addEventListener("keydown", function (e) { if (e.key === "Enter") handleLogWeight(); });
  document.getElementById("wkWeightLog").addEventListener("click", function (e) {
    var btn = e.target.closest("[data-action='delete-weight']");
    if (btn) handleDeleteWeight(btn.getAttribute("data-id"));
  });
  document.getElementById("wkAddBtn").addEventListener("click", handleAdd);
  ["wkName", "wkDuration", "wkNotes"].forEach(function (id) {
    document.getElementById(id).addEventListener("keydown", function (e) { if (e.key === "Enter") handleAdd(); });
  });
  document.getElementById("wkSortDate").addEventListener("click", function () {
    sortBy = "date";
    document.getElementById("wkSortDate").classList.add("active");
    document.getElementById("wkSortCat").classList.remove("active");
    renderList();
  });
  document.getElementById("wkSortCat").addEventListener("click", function () {
    sortBy = "category";
    document.getElementById("wkSortCat").classList.add("active");
    document.getElementById("wkSortDate").classList.remove("active");
    renderList();
  });
  document.getElementById("wkList").addEventListener("click", function (e) {
    var btn = e.target.closest("[data-action]");
    if (!btn) return;
    var action = btn.getAttribute("data-action");
    var id = btn.getAttribute("data-id");
    if (action === "edit") startRowEdit(id);
    else if (action === "delete") handleDelete(id);
    else if (action === "save-row") saveRowEdit();
    else if (action === "cancel-row") cancelRowEdit();
    else if (action === "toggle-expand") toggleExpand(id);
    else if (action === "add-lift") handleAddLift(btn.getAttribute("data-item"));
    else if (action === "delete-lift") handleDeleteLift(btn.getAttribute("data-item"), btn.getAttribute("data-lift"));
    else if (action === "edit-lift") startLiftEdit(btn.getAttribute("data-item"), btn.getAttribute("data-lift"));
    else if (action === "save-lift") saveLiftEdit();
    else if (action === "cancel-lift-edit") cancelLiftEdit();
  });
  document.getElementById("wkList").addEventListener("input", function (e) {
    var field = e.target.getAttribute && e.target.getAttribute("data-edit");
    if (field) editRowForm[field] = e.target.value;
    var liftField = e.target.getAttribute && e.target.getAttribute("data-lift-edit");
    if (liftField) editingLiftForm[liftField] = e.target.value;
  });
  document.getElementById("wkList").addEventListener("change", function (e) {
    var field = e.target.getAttribute && e.target.getAttribute("data-edit");
    if (field) editRowForm[field] = e.target.value;
  });
  document.getElementById("wkList").addEventListener("keydown", function (e) {
    if (e.target.getAttribute && e.target.getAttribute("data-lift-field") === "name" && e.key === "Enter") {
      handleAddLift(e.target.getAttribute("data-item"));
      return;
    }
    if (e.target.getAttribute && e.target.getAttribute("data-lift-edit")) {
      if (e.key === "Enter") saveLiftEdit();
      if (e.key === "Escape") cancelLiftEdit();
      return;
    }
    if (!e.target.getAttribute || !e.target.getAttribute("data-edit")) return;
    if (e.key === "Enter") saveRowEdit();
    if (e.key === "Escape") cancelRowEdit();
  });
  document.getElementById("wkResetBtn").addEventListener("click", handleResetAll);

  document.getElementById("wkDate").value = todayISO();
  renderPills();
  renderDynamic();
}

/* ---------------- routines tab ---------------- */

async function renderRoutinesTab(root) {
  root.innerHTML = '<div class="empty-state">Loading\u2026</div>';
  var accent = "#D9A441";
  var defaultData = { routines: [] };
  var data = await loadTabData("dashboard-routines-data", defaultData);
  var confirmReset = false;

  function save() { saveTabData("dashboard-routines-data", data); }

  root.innerHTML =
    '<div class="tab-eyebrow">DAILY ROUTINES</div>' +
    '<header style="margin-bottom:20px;"><h2 class="serif" style="color:#EDEAE3;font-size:30px;margin:0 0 4px;">Routines</h2><div class="mono" id="rtLongest" style="color:' + accent + ';font-size:12px;"></div></header>' +
    '<div class="card"><div class="gauge-top"><span class="gauge-label mono">TODAY</span><span class="mono" id="rtTodayAmount" style="color:' + accent + ';"></span></div><div class="gauge-track"><div class="gauge-fill" id="rtGaugeFill" style="background:linear-gradient(90deg,' + accent + "," + accent + 'cc);box-shadow:0 0 14px ' + accent + '55;"></div></div></div>' +
    '<div class="card"><div class="row-gap"><input class="form-input" id="rtNewName" placeholder="New routine, e.g. Morning walk" /><button class="add-btn" id="rtAddBtn" style="background:' + accent + ';flex-shrink:0;">+ Add</button></div></div>' +
    '<div class="list-card" id="rtList"></div>' +
    '<div class="bottom-row"><button class="link-btn" id="rtResetBtn" style="color:#8A919C;">Clear this tab</button></div>';

  function renderTop() {
    var today = todayISO();
    var doneToday = data.routines.filter(function (r) { return r.completions.indexOf(today) !== -1; }).length;
    var total = data.routines.length;
    var pct = total > 0 ? (doneToday / total) * 100 : 0;
    document.getElementById("rtTodayAmount").textContent = total > 0 ? doneToday + " of " + total + " done" : "no routines yet";
    document.getElementById("rtGaugeFill").style.width = pct + "%";
    var longest = data.routines.reduce(function (max, r) { var s = computeStreak(new Set(r.completions)); return s > max ? s : max; }, 0);
    document.getElementById("rtLongest").textContent = longest > 0 ? "Longest streak: " + longest + " days" : "";
  }

  function renderList() {
    var today = todayISO();
    var listEl = document.getElementById("rtList");
    if (data.routines.length === 0) {
      listEl.innerHTML = '<div class="empty-state">No routines yet. Add the first habit you want to keep showing up for.</div>';
      return;
    }
    listEl.innerHTML = data.routines.map(function (r) {
      var doneTodayFlag = r.completions.indexOf(today) !== -1;
      var streak = computeStreak(new Set(r.completions));
      return '<div class="item-row"><div class="item-display">' +
        '<span class="item-bar" style="background:' + r.color + ';"></span>' +
        '<div class="item-main"><div class="item-name">' + escapeHtml(r.name) + '</div><div class="item-sub mono">' + (streak > 0 ? streak + " day streak" : "no streak yet") + "</div></div>" +
        '<button class="pill" data-action="toggle" data-id="' + r.id + '" style="background:' + (doneTodayFlag ? r.color : "transparent") + ";border-color:" + r.color + ";color:" + (doneTodayFlag ? "#12151A" : r.color) + ';flex-shrink:0;">' + (doneTodayFlag ? "Done today \u2713" : "Mark done") + "</button>" +
        '<button class="icon-btn" data-action="delete" data-id="' + r.id + '">\u2715</button>' +
        "</div></div>";
    }).join("");
  }

  function renderDynamic() { renderTop(); renderList(); }

  document.getElementById("rtAddBtn").addEventListener("click", function () {
    var input = document.getElementById("rtNewName");
    var name = input.value.trim();
    if (!name) return;
    var color = ROUTINE_COLORS[data.routines.length % ROUTINE_COLORS.length];
    data.routines.push({ id: uid(), name: name, color: color, completions: [] });
    save();
    input.value = "";
    renderDynamic();
  });
  document.getElementById("rtNewName").addEventListener("keydown", function (e) {
    if (e.key === "Enter") document.getElementById("rtAddBtn").click();
  });
  document.getElementById("rtList").addEventListener("click", function (e) {
    var btn = e.target.closest("[data-action]");
    if (!btn) return;
    var action = btn.getAttribute("data-action");
    var id = btn.getAttribute("data-id");
    var today = todayISO();
    if (action === "toggle") {
      data.routines = data.routines.map(function (r) {
        if (r.id !== id) return r;
        var has = r.completions.indexOf(today) !== -1;
        return Object.assign({}, r, { completions: has ? r.completions.filter(function (c) { return c !== today; }) : r.completions.concat([today]) });
      });
      save();
      renderDynamic();
    } else if (action === "delete") {
      data.routines = data.routines.filter(function (r) { return r.id !== id; });
      save();
      renderDynamic();
    }
  });
  document.getElementById("rtResetBtn").addEventListener("click", function () {
    var btn = document.getElementById("rtResetBtn");
    if (!confirmReset) {
      confirmReset = true;
      btn.textContent = "Click again to clear everything";
      btn.style.color = "#FF8A5C";
      setTimeout(function () { confirmReset = false; if (document.getElementById("rtResetBtn")) { btn.textContent = "Clear this tab"; btn.style.color = "#8A919C"; } }, 4000);
      return;
    }
    data = { routines: [] };
    save();
    confirmReset = false;
    renderDynamic();
  });

  renderDynamic();
}

/* ---------------- boot ---------------- */

bootAuth();
</script>
