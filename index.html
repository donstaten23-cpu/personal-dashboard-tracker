<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard</title>
<style>
  @font-face {
    font-family: 'Asap';
    src: url('./Asap-VariableFont_wdth,wght.ttf') format('truetype');
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #12151A;
    font-family: 'Asap', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  .serif { font-family: inherit; font-style: normal; font-weight: 800; letter-spacing: -0.01em; }
  .mono { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
  input, button, select { font-family: inherit; }
  input::placeholder { color: #5A6168; }
  button { cursor: pointer; }
  .wrap { min-height: 100vh; padding: 32px 16px; }
  .inner { max-width: 720px; margin: 0 auto; }

  .hero-band { background: linear-gradient(135deg, #FF8A5C 0%, #E8643A 45%, #B23A1C 100%); border-radius: 24px; padding: 28px 24px; margin-bottom: 16px; }
  .hero-eyebrow { color: rgba(255,255,255,0.85); font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px; font-weight: 600; }
  .hero-name { color: #fff; font-size: 36px; font-weight: 800; line-height: 1.1; letter-spacing: -0.01em; }
  .tab-eyebrow { color: #E8643A; font-size: 12px; text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; margin-bottom: 8px; }

  .tabnav { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
  .tabbtn { border: 1px solid #2A313A; background: #1B2027; color: #8A919C; border-radius: 999px; padding: 9px 18px; font-size: 15px; font-weight: 500; }
  .tabbtn.active { color: #12151A; }

  /* gauge amount spans — the "$X of $Y" dollar figures next to the label */
  #stGaugeAmount, #svGaugeAmount, #ttGaugeAmount, #ttSavingsAmount,
  #wkGaugeAmount, #rtTodayAmount { font-size: 16px !important; font-weight: 600; }

  /* before-payday total */
  #beforePayContent .mono { font-size: 22px !important; }

  /* streak counters */
  #wkStreak, #rtLongest { font-size: 14px !important; }

  /* footer total */
  .footer-total { color: #EDEAE3; font-size: 20px; font-weight: 700; }
  .footer-label { color: #8A919C; font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; }

  /* chips & pills slightly bigger */
  .chip { background: #1B2027; color: #EDEAE3; border: 1px solid #2A313A; display: flex; align-items: center; gap: 6px; border-radius: 999px; padding: 5px 13px; font-size: 13px; }
  .pill { border: 1px solid; display: flex; align-items: center; gap: 6px; border-radius: 999px; padding: 7px 13px; font-size: 13px; font-weight: 500; background: transparent; }

  /* countdown unit numbers */
  .cd-days, .cd-hrs, .cd-min, .cd-sec { font-size: 26px !important; }

  /* weight current display */
  .weight-current { font-size: 32px; font-weight: 800; }

  /* entry count + sort buttons */
  .entry-count { color: #8A919C; font-size: 13px; }
  .sort-toggle { background: #1B2027; display: flex; gap: 4px; border-radius: 999px; padding: 4px; font-size: 13px; }

  .name-input { color: #EDEAE3; background: transparent; border: none; border-bottom: 1px solid transparent; width: 100%; margin-bottom: 4px; font-size: 30px; padding: 4px 0; }
  .name-input:focus { outline: none; border-bottom: 1px solid #2A313A; }
  .date-row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; font-size: 12px; color: #8A919C; margin-bottom: 8px; }
  .date-row label { display: flex; align-items: center; gap: 6px; }
  .date-row input { background: #1B2027; color: #EDEAE3; border: 1px solid #2A313A; border-radius: 6px; padding: 4px 8px; }

  .card { background: #1B2027; border: 1px solid #2A313A; border-radius: 16px; padding: 18px; margin-bottom: 16px; }
  .gauge-top { margin-bottom: 10px; display: flex; align-items: baseline; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
  .gauge-label { color: #8A919C; font-size: 12px; text-transform: uppercase; letter-spacing: 0.09em; font-weight: 600; }
  .gauge-track { background: #2A313A; position: relative; height: 16px; width: 100%; overflow: hidden; border-radius: 999px; }
  .gauge-fill { height: 100%; border-radius: 999px; }
  .link-btn { background: none; border: none; text-decoration: underline; font-size: 13px; padding: 0; }
  .row-gap { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .small-input { background: #12151A; color: #EDEAE3; border: 1px solid #2A313A; border-radius: 6px; padding: 4px 8px; width: 128px; font-size: 14px; }
  .small-btn { color: #12151A; border: none; border-radius: 999px; padding: 4px 12px; font-size: 13px; font-weight: 600; }

  .chips { margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 8px; }
  .chip-num { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; font-weight: 700; margin-right: 2px; }

  .pills { margin-bottom: 12px; display: flex; flex-wrap: wrap; gap: 8px; }

  .trip-switcher { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .trip-pill { border: 1px solid #2A313A; background: #1B2027; color: #8A919C; border-radius: 999px; padding: 8px 14px; font-size: 13px; font-weight: 500; max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .weight-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; }
  .weight-current { font-size: 28px; font-weight: 800; }
  .weight-log-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 6px 0; border-bottom: 1px solid #2A313A; font-size: 13px; }
  .weight-log-row:last-child { border-bottom: none; }

  .form-row { margin-bottom: 8px; display: grid; grid-template-columns: 1fr; gap: 8px; }
  .form-row-split { display: flex; gap: 8px; }
  .form-input { background: #12151A; color: #EDEAE3; border: 1px solid #2A313A; border-radius: 6px; padding: 8px 12px; font-size: 14px; width: 100%; }
  .form-actions { display: flex; align-items: center; justify-content: flex-end; gap: 12px; flex-wrap: wrap; }
  .error-text { color: #FF8A5C; font-size: 12px; }
  .add-btn { color: #12151A; border: none; display: flex; align-items: center; gap: 6px; border-radius: 999px; padding: 8px 16px; font-size: 14px; font-weight: 600; }

  .select-bar { margin-bottom: 12px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 8px; }
  .select-bar-actions { display: flex; align-items: center; gap: 12px; }

  .sort-row { margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
  .sort-btn { border: none; border-radius: 999px; padding: 4px 12px; background: transparent; color: #8A919C; }
  .sort-btn.active { background: #2A313A; color: #EDEAE3; }

  .list-card { background: #1B2027; border: 1px solid #2A313A; border-radius: 16px; padding: 0 16px; }
  .empty-state { color: #8A919C; padding: 40px 0; text-align: center; font-size: 14px; }
  .item-row { border-bottom: 1px solid #2A313A; padding: 12px 0; }
  .item-row:last-child { border-bottom: none; }
  .item-display { display: flex; align-items: center; gap: 12px; }
  .item-bar { height: 32px; width: 4px; flex-shrink: 0; border-radius: 999px; }
  .item-glyph { flex-shrink: 0; font-size: 18px; width: 20px; text-align: center; }
  .item-main { min-width: 0; flex: 1; }
  .item-name { color: #EDEAE3; font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-sub { color: #8A919C; font-size: 13px; }
  .item-amount { flex-shrink: 0; font-size: 15px; }
  .item-actions { display: flex; flex-shrink: 0; gap: 8px; }
  .icon-btn { color: #8A919C; background: none; border: none; font-size: 16px; padding: 4px; }
  .checkbox { flex-shrink: 0; height: 17px; width: 17px; }

  .item-edit { display: flex; flex-direction: column; gap: 8px; }
  .edit-line { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
  .edit-select { background: #12151A; color: #EDEAE3; border: 1px solid #2A313A; border-radius: 6px; padding: 6px 8px; font-size: 13px; }
  .edit-input { background: #12151A; color: #EDEAE3; border: 1px solid #2A313A; border-radius: 6px; padding: 6px 8px; font-size: 13px; min-width: 0; }
  .edit-input.grow { flex: 1; }
  .edit-input.amt { width: 88px; }
  .edit-input.date { width: 140px; }

  .footer-row { border-top: 1px solid #2A313A; margin-top: 24px; display: flex; align-items: center; justify-content: space-between; padding-top: 16px; }
  .bottom-row { margin-top: 24px; text-align: center; display: flex; flex-direction: column; gap: 10px; }

  /* ---- animations ---- */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes slideRight {
    from { opacity: 0; transform: translateX(-14px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  /* scroll-triggered animation classes - added/removed by IntersectionObserver */
  .sa-up   { animation: slideUp   0.42s cubic-bezier(0.22,1,0.36,1) both; }
  .sa-down { animation: slideDown 0.42s cubic-bezier(0.22,1,0.36,1) both; }

  /* gauge fill bar */
  .gauge-fill { transition: width 0.7s cubic-bezier(0.22,1,0.36,1); }


  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-delay: 0ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<div class="wrap"><div class="inner">

  <div id="authScreen">
    <header style="margin-bottom:24px;">
      <h1 class="serif" style="color:#EDEAE3;font-size:30px;margin:0 0 8px;">Dashboard</h1>
      <div style="color:#8A919C;font-size:13px;">Sign in to sync your data across devices.</div>
    </header>
    <form id="authForm" class="card" style="margin:0;" method="post" action="#">
      <div class="form-row">
        <input class="form-input" type="email" id="authEmail" name="email" placeholder="Email" autocomplete="username" required />
        <input class="form-input" type="password" id="authPassword" name="password" placeholder="Password" autocomplete="current-password" required />
      </div>
      <div class="form-actions">
        <span class="error-text" id="authError"></span>
        <button type="button" class="link-btn" id="authSignUpBtn" style="color:#8A919C;">Create account</button>
        <button type="submit" class="add-btn" id="authSignInBtn" style="background:#E8643A;">Sign in</button>
      </div>
    </form>
  </div>

  <div id="dashboardScreen" style="display:none;">
    <div class="hero-band">
      <div class="hero-eyebrow" id="heroEyebrow">Hi there,</div>
      <div class="hero-name" id="heroName"></div>
    </div>
    <div style="text-align:right;margin-bottom:12px;">
      <button class="link-btn" id="changePasswordBtn" style="color:#8A919C;margin-right:16px;">Change password</button>
      <button class="link-btn" id="signOutBtn" style="color:#8A919C;">Sign out</button>
    </div>
    <form id="changePasswordForm" class="card" method="post" action="#" style="display:none;margin-bottom:16px;">
      <div class="form-row">
        <input class="form-input" type="password" id="newPasswordInput" name="new-password" placeholder="New password" autocomplete="new-password" />
        <input class="form-input" type="password" id="confirmPasswordInput" name="confirm-password" placeholder="Confirm new password" autocomplete="new-password" />
      </div>
      <div class="form-actions">
        <span class="error-text" id="changePasswordError"></span>
        <button type="submit" class="add-btn" id="updatePasswordBtn" style="background:#E8643A;">Update password</button>
      </div>
    </form>
    <div class="tabnav" id="tabnav"></div>
    <div id="tabroot"></div>
  </div>

</div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ---------------- Supabase config ----------------
   Replace these two values with your own project's URL and publishable key.
   Find them in your Supabase project: Settings -> API. */
var SUPABASE_URL = "https://rqlnwomkrmhxffzzngyi.supabase.co";
var SUPABASE_ANON_KEY = "sb_publishable_f1oApcIXVoxrcRB5_WSSAQ_HRLfqXE8";

/* Change this to update the greeting name shown at the top. */
var USER_DISPLAY_NAME = "Don";
/* Used to label the two people in the Budget tab's pay schedule. */
var PARTNER_DISPLAY_NAME = "Wife";

var supabaseClient = null;
var currentUserId = null;

/* ---------------- shared constants ---------------- */

var TABS = [
  { id: "travel", label: "Travel", accent: "#E8643A" },
  { id: "budget", label: "Budget", accent: "#5BAE7A" },
  { id: "workouts", label: "Workouts", accent: "#3DBFC4" },
  { id: "routines", label: "Routines", accent: "#D9A441" }
];

var TRAVEL_CATEGORIES = [
  { id: "flights", label: "Flights", color: "#E8643A", glyph: "\u2708" },
  { id: "stay", label: "Stay", color: "#D9A441", glyph: "\u2302" },
  { id: "activities", label: "Activities", color: "#7FA37A", glyph: "\u25C8" },
  { id: "food", label: "Food", color: "#D9667A", glyph: "\u2726" },
  { id: "transport", label: "Transport", color: "#5B8FA8", glyph: "\u219D" },
  { id: "other", label: "Other", color: "#8FA8AC", glyph: "\u00B7\u00B7\u00B7" }
];

var BUDGET_CATEGORIES = [
  { id: "housing", label: "Housing", color: "#5BAE7A", glyph: "\u2302" },
  { id: "food", label: "Food", color: "#D9667A", glyph: "\u2726" },
  { id: "transport", label: "Transport", color: "#5B8FA8", glyph: "\u219D" },
  { id: "entertainment", label: "Entertainment", color: "#C97FBF", glyph: "\u266B" },
  { id: "savings", label: "Savings", color: "#D9A441", glyph: "\u25C6" },
  { id: "other", label: "Other", color: "#8FA8AC", glyph: "\u00B7\u00B7\u00B7" }
];

var WORKOUT_CATEGORIES = [
  { id: "strength", label: "Strength", color: "#3DBFC4", glyph: "\u25B2" },
  { id: "cardio", label: "Cardio", color: "#E1543F", glyph: "\u2665" },
  { id: "yoga", label: "Yoga / Mobility", color: "#7FA37A", glyph: "\u2740" },
  { id: "sports", label: "Sports", color: "#D9A441", glyph: "\u2605" },
  { id: "other", label: "Other", color: "#8FA8AC", glyph: "\u00B7\u00B7\u00B7" }
];

var ROUTINE_COLORS = ["#E8643A", "#5BAE7A", "#3DBFC4", "#D9A441", "#C97FBF", "#7187E0"];

var BUDGET_IMPORT_BILLS = null; // intentionally left empty for the public repo

/* ---------------- helpers ---------------- */

function uid() { return "id-" + Date.now() + "-" + Math.random().toString(36).slice(2, 7); }
function todayISO() { return new Date().toISOString().slice(0, 10); }
function addDaysISO(iso, delta) {
  var d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + delta);
  return d.toISOString().slice(0, 10);
}
function formatCurrency(n) {
  return new Intl.NumberFormat("en-US", { style: "currency", currency: "USD" }).format(Number(n) || 0);
}
function formatDateShort(iso) {
  if (!iso) return "no date yet";
  var d = new Date(iso + "T00:00:00");
  if (isNaN(d.getTime())) return "no date yet";
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}
function ordinalDay(n) {
  n = Number(n);
  if (!n || n < 1) return "";
  var s = ["th", "st", "nd", "rd"];
  var v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}
function isDueBeforePay(billDay, todayDay, payDay) {
  if (payDay >= todayDay) return billDay >= todayDay && billDay <= payDay;
  return billDay >= todayDay || billDay <= payDay;
}
function isCurrentlyPaid(item) {
  if (!item.paidOn || item.dueDay === "" || item.dueDay == null) return false;
  var today = new Date();
  var dueDayNum = Number(item.dueDay);
  var mostRecentDue = new Date(today.getFullYear(), today.getMonth(), dueDayNum);
  if (dueDayNum > today.getDate()) {
    mostRecentDue = new Date(today.getFullYear(), today.getMonth() - 1, dueDayNum);
  }
  var paidDate = new Date(item.paidOn + "T00:00:00");
  return paidDate >= mostRecentDue;
}
function escapeHtml(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
    return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
  });
}
function computeStreak(dateSet) {
  var count = 0;
  var cursor = todayISO();
  if (!dateSet.has(cursor)) cursor = addDaysISO(cursor, -1);
  while (dateSet.has(cursor)) {
    count++;
    cursor = addDaysISO(cursor, -1);
  }
  return count;
}
function weekKeyForDate(iso) {
  var d = new Date(iso + "T00:00:00");
  var day = d.getDay();
  var diffToMonday = day === 0 ? -6 : 1 - day;
  d.setDate(d.getDate() + diffToMonday);
  return d.toISOString().slice(0, 10);
}
function todayWeekKey() { return weekKeyForDate(todayISO()); }
function computeWeekStreak(weekKeySet) {
  var count = 0;
  var cursor = todayWeekKey();
  if (!weekKeySet.has(cursor)) {
    var d = new Date(cursor + "T00:00:00");
    d.setDate(d.getDate() - 7);
    cursor = d.toISOString().slice(0, 10);
  }
  while (weekKeySet.has(cursor)) {
    count++;
    var d2 = new Date(cursor + "T00:00:00");
    d2.setDate(d2.getDate() - 7);
    cursor = d2.toISOString().slice(0, 10);
  }
  return count;
}
function categoryById(list, id) {
  for (var i = 0; i < list.length; i++) if (list[i].id === id) return list[i];
  return list[list.length - 1];
}
function numLabel(i) { return "#" + String(i + 1).padStart(2, "0"); }
function getTimeGreeting() {
  var hour = new Date().getHours();
  if (hour < 12) return "Good morning";
  if (hour < 17) return "Good afternoon";
  return "Good evening";
}

async function loadTabData(key, defaultData) {
  try {
    var result = await supabaseClient.from("dashboard_data").select("data").eq("user_id", currentUserId).eq("tab_key", key).maybeSingle();
    if (result.error) { console.error(result.error); return JSON.parse(JSON.stringify(defaultData)); }
    if (result.data && result.data.data) return Object.assign({}, defaultData, result.data.data);
    return JSON.parse(JSON.stringify(defaultData));
  } catch (e) {
    console.error(e);
    return JSON.parse(JSON.stringify(defaultData));
  }
}
async function saveTabData(key, data) {
  try {
    await supabaseClient.from("dashboard_data").upsert({ user_id: currentUserId, tab_key: key, data: data, updated_at: new Date().toISOString() });
  } catch (e) {
    console.error(e);
  }
}

/* ---------------- auth ---------------- */

function showAuthScreen() {
  document.getElementById("authScreen").style.display = "block";
  document.getElementById("dashboardScreen").style.display = "none";
}
function renderGreeting() {
  var eyebrow = document.getElementById("heroEyebrow");
  var name = document.getElementById("heroName");
  if (eyebrow) eyebrow.textContent = getTimeGreeting() + ",";
  if (name) name.textContent = USER_DISPLAY_NAME;
}
function showDashboardScreen() {
  document.getElementById("authScreen").style.display = "none";
  document.getElementById("dashboardScreen").style.display = "block";
  renderGreeting();
  renderTabNav();
  renderActiveTab();
}

async function handleSignIn() {
  var email = document.getElementById("authEmail").value.trim();
  var password = document.getElementById("authPassword").value;
  var errEl = document.getElementById("authError");
  errEl.style.color = "#FF8A5C";
  errEl.textContent = "";
  if (!email || !password) { errEl.textContent = "Enter an email and password."; return; }
  var result = await supabaseClient.auth.signInWithPassword({ email: email, password: password });
  if (result.error) errEl.textContent = result.error.message;
}
async function handleSignUp() {
  var email = document.getElementById("authEmail").value.trim();
  var password = document.getElementById("authPassword").value;
  var errEl = document.getElementById("authError");
  errEl.style.color = "#FF8A5C";
  errEl.textContent = "";
  if (!email || !password) { errEl.textContent = "Enter an email and password."; return; }
  var result = await supabaseClient.auth.signUp({ email: email, password: password });
  if (result.error) { errEl.textContent = result.error.message; return; }
  if (!result.data || !result.data.session) {
    errEl.style.color = "#7FA37A";
    errEl.textContent = "Account created \u2014 check your email to confirm, then sign in.";
  }
}

function bootAuth() {
  // These submit listeners are attached FIRST, unconditionally, before we
  // even know whether the Supabase library loaded. This is deliberate: a
  // <form> with no JS listener attached falls back to the browser's native
  // GET submission, which would put the password straight into the URL.
  // Attaching this immediately closes that gap no matter how slow (or how
  // broken) the Supabase CDN load turns out to be.
  document.getElementById("authForm").addEventListener("submit", function (e) {
    e.preventDefault();
    if (!supabaseClient) { document.getElementById("authError").textContent = "Still connecting \u2014 try again in a moment."; return; }
    handleSignIn();
  });
  document.getElementById("authSignUpBtn").addEventListener("click", function () {
    if (!supabaseClient) { document.getElementById("authError").textContent = "Still connecting \u2014 try again in a moment."; return; }
    handleSignUp();
  });
  document.getElementById("changePasswordForm").addEventListener("submit", function (e) {
    e.preventDefault();
    if (!supabaseClient) { document.getElementById("changePasswordError").textContent = "Still connecting \u2014 try again in a moment."; return; }
    handleUpdatePassword();
  });
  var showChangePassword = false;
  document.getElementById("changePasswordBtn").addEventListener("click", function () {
    showChangePassword = !showChangePassword;
    document.getElementById("changePasswordForm").style.display = showChangePassword ? "block" : "none";
    document.getElementById("changePasswordError").textContent = "";
    if (!showChangePassword) {
      document.getElementById("newPasswordInput").value = "";
      document.getElementById("confirmPasswordInput").value = "";
    }
  });

  if (!window.supabase) { document.getElementById("authError").textContent = "Couldn't load the Supabase library. Check your internet connection."; return; }
  try {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  } catch (e) {
    document.getElementById("authError").textContent = "Supabase isn't set up yet \u2014 check SUPABASE_URL and SUPABASE_ANON_KEY near the top of the file.";
    return;
  }

  document.getElementById("signOutBtn").addEventListener("click", function () { supabaseClient.auth.signOut(); });

  supabaseClient.auth.onAuthStateChange(function (event, session) {
    if (event === "TOKEN_REFRESHED") return;
    if (session) {
      currentUserId = session.user.id;
      showDashboardScreen();
    } else {
      currentUserId = null;
      showAuthScreen();
    }
  });
}

async function handleUpdatePassword() {
  var newPw = document.getElementById("newPasswordInput").value;
  var confirmPw = document.getElementById("confirmPasswordInput").value;
  var errEl = document.getElementById("changePasswordError");
  errEl.style.color = "#FF8A5C";
  if (!newPw || newPw.length < 6) { errEl.textContent = "Password must be at least 6 characters."; return; }
  if (newPw !== confirmPw) { errEl.textContent = "Passwords don\u2019t match."; return; }
  errEl.style.color = "#8A919C";
  errEl.textContent = "Updating\u2026";
  var result = await supabaseClient.auth.updateUser({ password: newPw });
  if (result.error) {
    errEl.style.color = "#FF8A5C";
    errEl.textContent = result.error.message;
    return;
  }
  errEl.style.color = "#7FA37A";
  errEl.textContent = "Password updated.";
  document.getElementById("newPasswordInput").value = "";
  document.getElementById("confirmPasswordInput").value = "";
}

var currentTab = "travel";

function renderTabNav() {

  nav.innerHTML = TABS.map(function (t) {
    var active = t.id === currentTab;

    return '<button class="tabbtn' + (active ? " active" : "") + '" data-tab="' + t.id + '" style="' + style + '">' + t.label + "</button>";
  }).join("");
  var btns = nav.querySelectorAll(".tabbtn");
  for (var i = 0; i < btns.length; i++) {

function renderActiveTab() {
  if (window._countdownInterval) { clearInterval(window._countdownInterval); window._countdownInterval = null; }
  var root = document.getElementById("tabroot");
  root.innerHTML = "";
  if (currentTab === "travel") {
    renderTravelTab(root);
  } else if (currentTab === "budget") {
    renderSpendTab(root, {
      storageKey: "dashboard-budget-data",
      defaultTitle: "Monthly Budget",
      categories: BUDGET_CATEGORIES,
      goalLabel: "Monthly budget",

      accent: "#5BAE7A",

  document.getElementById("stTitle").value = data.title;

  function renderGauge() {

      document.getElementById("svShowGoal").addEventListener("click", function () { savingsDraft = ""; showSavingsInput = true; renderSavingsGauge(); });

  function commitSavingsGoal() {
    if (savingsDraft === "" || isNaN(Number(savingsDraft))) { showSavingsInput = false; renderSavingsGauge(); return; }

  function personLabel(p) { return p === "partner" ? PARTNER_DISPLAY_NAME : USER_DISPLAY_NAME; }

  function renderPayPersonPills() {
    var el = document.getElementById("payPersonPills");
    if (!el) return;

  function renderPlannedList() {

    }

  function renderBeforePay() {
    var contentEl = document.getElementById("beforePayContent");
    var labelEl = document.getElementById("beforePayLabel");
    if (!contentEl) return;

    var periods = (data.payPeriods || []).filter(function (p) { return p.person === payPersonChoice && Number(p.day); });
    if (periods.length === 0) {
      if (labelEl) labelEl.textContent = "BEFORE " + personLabel(payPersonChoice).toUpperCase() + "\u2019S NEXT PAYCHECK";
      contentEl.innerHTML = '<div style="color:#8A919C;font-size:13px;">No paychecks added for ' + escapeHtml(personLabel(payPersonChoice)) + ' yet \u2014 add one below.</div>';
      return;
    }
    if (labelEl) labelEl.textContent = periods.length > 1 ? "BEFORE " + personLabel(payPersonChoice).toUpperCase() + "\u2019S UPCOMING PAYCHECKS" : "BEFORE " + personLabel(payPersonChoice).toUpperCase() + "\u2019S NEXT PAYCHECK";

    var todayDay = new Date().getDate();
    function daysAwayFor(day) { return day >= todayDay ? day - todayDay : (31 - todayDay) + day; }

    var sortedPeriods = periods.slice().sort(function (a, b) { return daysAwayFor(Number(a.day)) - daysAwayFor(Number(b.day)); });

    // Only bills explicitly assigned to this person count here -- unassigned
    // or other-person bills are left out, since the point is "what's on
    // *your* plate before *your* next check(s)."
    var ownedBills = data.items.filter(function (it) {
      return it.category !== "savings" && it.owner === payPersonChoice && it.dueDay !== "" && it.dueDay != null && !isCurrentlyPaid(it);
    }).map(function (it) {
      return Object.assign({}, it, { daysAway: daysAwayFor(Number(it.dueDay)) });
    });

    var prevCutoff = -1;
    var blocks = sortedPeriods.map(function (p, idx) {
      var dayNum = Number(p.day);
      var cutoff = daysAwayFor(dayNum);
      var dueBills = ownedBills.filter(function (b) { return b.daysAway > prevCutoff && b.daysAway <= cutoff; });
      prevCutoff = cutoff;
      var total = dueBills.reduce(function (s, b) { return s + (Number(b.amount) || 0); }, 0);
      var inner;
      if (dueBills.length === 0) {
        inner = '<div style="color:' + cfg.accent + ';font-size:14px;">Nothing due before the ' + ordinalDay(dayNum) + '. \u2728</div>';
      } else {
        inner =
          '<div class="mono" style="color:#FF8A5C;font-size:18px;font-weight:700;margin-bottom:4px;">' + formatCurrency(total) + '</div>' +
          '<div style="color:#8A919C;font-size:13px;margin-bottom:8px;">due before the ' + ordinalDay(dayNum) + '</div>' +
          '<div style="color:#EDEAE3;font-size:13px;">' + dueBills.map(function (b) { return escapeHtml(b.name); }).join(", ") + '</div>';
      }
      var isLast = idx === sortedPeriods.length - 1;
      var wrap = !isLast ? 'margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid #2A313A;' : '';
      return '<div style="' + wrap + '">' + inner + '</div>';
    });
    contentEl.innerHTML = blocks.join("");
  }

  function renderChips() {
    var totals = cfg.categories.map(function (cat, i) {
      var total = data.items.filter(function (it) { return it.category === cat.id; }).reduce(function (s, it) { return s + (Number(it.amount) || 0); }, 0);
      return Object.assign({}, cat, { total: total, idx: i });
    }).filter(function (c) { return c.total > 0; });
    document.getElementById("stChips").innerHTML = totals.map(function (cat) {
      return '<span class="chip"><span class="chip-num" style="color:' + cat.color + '">' + numLabel(cat.idx) + '</span> ' + escapeHtml(cat.label) + ' <span class="mono" style="color:' + cfg.accent + ';">' + formatCurrency(cat.total) + "</span></span>";
    }).join("");
  }

  function renderPills() {
    document.getElementById("stPills").innerHTML = cfg.categories.map(function (cat) {
      var active = cat.id === activeCat;
      return '<button class="pill" data-cat="' + cat.id + '" style="background:' + (active ? cat.color : "transparent") + ";border-color:" + cat.color + ";color:" + (active ? "#12151A" : cat.color) + ';">' + cat.glyph + " " + escapeHtml(cat.label) + "</button>";
    }).join("");
    var pills = document.getElementById("stPills").querySelectorAll(".pill");
    for (var i = 0; i < pills.length; i++) {
      pills[i].addEventListener("click", function (e) { activeCat = e.currentTarget.getAttribute("data-cat"); renderPills(); });
    }
  }

  function getSortedItems() {
    var copy = data.items.slice();
    if (sortBy === "date") {
      copy.sort(function (a, b) {
        var da = a.dueDay === "" || a.dueDay == null ? 99 : Number(a.dueDay);
        var db = b.dueDay === "" || b.dueDay == null ? 99 : Number(b.dueDay);
        return da - db;
      });
    } else {
      var order = cfg.categories.map(function (c) { return c.id; });
      copy.sort(function (a, b) {
        var d = order.indexOf(a.category) - order.indexOf(b.category);
        if (d !== 0) return d;
        var da = a.dueDay === "" || a.dueDay == null ? 99 : Number(a.dueDay);
        var db = b.dueDay === "" || b.dueDay == null ? 99 : Number(b.dueDay);
        return da - db;
      });
    }
    return copy;
  }

  function renderSelectBar() {
    if (!cfg.enableSelection) return;
    var sel = new Set(data.selectedIds || []);
    var total = data.items.filter(function (it) { return sel.has(it.id); }).reduce(function (s, it) { return s + (Number(it.amount) || 0); }, 0);
    document.getElementById("stSelectBar").innerHTML =
      '<div class="select-bar-actions"><button class="link-btn" id="stSelectAll" style="color:' + cfg.accent + ';">Select all</button>' +
      '<button class="link-btn" id="stClearSel" style="color:#8A919C;">Clear</button></div>' +
      '<span class="mono" style="color:' + cfg.accent + ';">' + sel.size + " selected \u00B7 " + formatCurrency(total) + "</span>";
    document.getElementById("stSelectAll").addEventListener("click", function () {
      data.selectedIds = getSortedItems().map(function (it) { return it.id; });
      save();
      renderSelectBar();
      renderList();
    });
    document.getElementById("stClearSel").addEventListener("click", function () {
      data.selectedIds = [];
      save();
      renderSelectBar();
      renderList();
    });
  }

  function toggleSelected(id) {
    var sel = new Set(data.selectedIds || []);
    if (sel.has(id)) sel.delete(id); else sel.add(id);
    data.selectedIds = Array.from(sel);
    save();
    renderSelectBar();
  }

  function renderList() {
    document.getElementById("stEntryCount").textContent = data.items.length + (data.items.length === 1 ? " entry" : " entries");
    var listEl = document.getElementById("stList");
    if (sorted.length === 0) {
      listEl.innerHTML = '<div class="empty-state">' + escapeHtml(cfg.emptyText) + "</div>";
      return;
    }
    var sel = new Set(data.selectedIds || []);
    listEl.innerHTML = sorted.map(function (item) {
      var cat = categoryById(cfg.categories, item.category);
      if (item.id === editRowId) {
        var f = editRowForm;
        return '<div class="item-row"><div class="item-edit">' +
          '<div class="edit-line">' +
          '<select class="edit-select" data-edit="category">' + cfg.categories.map(function (c) { return '<option value="' + c.id + '"' + (c.id === f.category ? " selected" : "") + ">" + escapeHtml(c.label) + "</option>"; }).join("") + "</select>" +
          '<input class="edit-input grow" data-edit="name" placeholder="Name" value="' + escapeHtml(f.name) + '" />' +
          '<input class="edit-input amt" type="number" min="1" max="31" data-edit="dueDay" placeholder="Due day" value="' + escapeHtml(f.dueDay) + '" />' +
          "</div>" +
          '<div class="edit-line">' +
          '<input class="edit-input amt" type="number" min="0" step="0.01" data-edit="amount" placeholder="' + escapeHtml(cfg.amountLabel) + '" value="' + escapeHtml(f.amount) + '" />' +
          '<input class="edit-input grow" data-edit="notes" placeholder="Notes" value="' + escapeHtml(f.notes) + '" />' +
          (cfg.showSavingsGoal ?
            '<select class="edit-select" data-edit="owner"><option value=""' + (f.owner === "" ? " selected" : "") + '>Unassigned</option><option value="me"' + (f.owner === "me" ? " selected" : "") + '>1 \u00B7 ' + escapeHtml(USER_DISPLAY_NAME) + '</option><option value="partner"' + (f.owner === "partner" ? " selected" : "") + '>2 \u00B7 ' + escapeHtml(PARTNER_DISPLAY_NAME) + '</option></select>'
          : "") +
          (editRowError ? '<span class="error-text">' + escapeHtml(editRowError) + "</span>" : "") +
          '<button class="icon-btn" data-action="save-row" style="color:' + cfg.accent + ';">\u2713</button>' +
          '<button class="icon-btn" data-action="cancel-row">\u2715</button>' +
          "</div></div></div>";
      }
      var dueDayText = item.dueDay !== "" && item.dueDay != null ? "Due " + ordinalDay(item.dueDay) : "no due day set";
      var ownerBadge = cfg.showSavingsGoal && item.owner ? '<span class="mono" style="color:#8A919C;font-size:11px;border:1px solid #2A313A;border-radius:999px;padding:2px 7px;flex-shrink:0;">' + (item.owner === "me" ? "1" : "2") + '</span>' : "";
      var paid = cfg.showSavingsGoal && isCurrentlyPaid(item);
      var paidBtn = cfg.showSavingsGoal ? '<button class="icon-btn" data-action="toggle-paid" data-id="' + item.id + '" title="' + (paid ? "Paid \u2014 click to undo" : "Mark as paid") + '" style="color:' + (paid ? "#7FA37A" : "#8A919C") + ';">' + (paid ? "\u2713" : "\u25CB") + '</button>' : "";
        (cfg.enableSelection ? '<input type="checkbox" class="checkbox" data-action="toggle-sel" data-id="' + item.id + '" ' + (sel.has(item.id) ? "checked" : "") + ' style="accent-color:' + cfg.accent + ';" />' : "") +
        '<span class="item-bar" style="background:' + cat.color + ';"></span>' +
        '<span class="item-glyph" style="color:' + cat.color + ';">' + cat.glyph + "</span>" +
        '<div class="item-main"><div class="item-name" style="' + (paid ? "text-decoration:line-through;" : "") + '">' + escapeHtml(item.name) + "</div>" +
        '<div class="item-sub">' + dueDayText + (item.notes ? " \u00B7 " + escapeHtml(item.notes) : "") + "</div></div>" +
        ownerBadge +
        '<div class="item-amount mono" style="color:' + cfg.accent + ';">' + formatCurrency(item.amount) + "</div>" +
        '<div class="item-actions">' + paidBtn + '<button class="icon-btn" data-action="edit" data-id="' + item.id + '">\u270E</button>' +
        '<button class="icon-btn" data-action="delete" data-id="' + item.id + '">\u2715</button></div>' +
        "</div></div>";
    }).join("");
  }

  function renderFooter() {
    var totalSpent = data.items.filter(function (it) { return it.category !== "savings"; }).reduce(function (s, it) { return s + (Number(it.amount) || 0); }, 0);
    document.getElementById("stFooterTotal").textContent = formatCurrency(totalSpent);
  }

  function renderDynamic() {
    renderGauge();
    renderSavingsGauge();
    renderBeforePay();
    renderChips();
    renderSelectBar();
    renderList();
    renderFooter();
    renderPlannedList();
  }

  function resetForm() {
    document.getElementById("stName").value = "";
    document.getElementById("stDueDay").value = "";
    document.getElementById("stAmount").value = "";
    document.getElementById("stNotes").value = "";
    document.getElementById("stFormError").textContent = "";
    ownerChoice = "";
    renderOwnerPills();
  }

  function handleAdd() {
    var name = document.getElementById("stName").value.trim();
    var dueDayVal = document.getElementById("stDueDay").value;
    var amountVal = document.getElementById("stAmount").value;
    var notesVal = document.getElementById("stNotes").value;
    var errEl = document.getElementById("stFormError");
    if (!name) { errEl.textContent = "Give it a name first."; return; }
    if (amountVal === "" || isNaN(Number(amountVal))) { errEl.textContent = "Add " + cfg.amountLabel.toLowerCase() + "."; return; }
    errEl.textContent = "";
    data.items.push({ id: uid(), category: activeCat, name: name, dueDay: dueDayVal === "" ? "" : Number(dueDayVal), amount: Number(amountVal), notes: notesVal, owner: ownerChoice, paidOn: "" });
    save();
    resetForm();
    renderDynamic();
  }

  function startRowEdit(id) {
    var item = data.items.find(function (it) { return it.id === id; });
    if (!item) return;
    editRowId = id;
    editRowForm = { category: item.category, name: item.name, dueDay: item.dueDay === "" || item.dueDay == null ? "" : String(item.dueDay), amount: String(item.amount), notes: item.notes || "", owner: item.owner || "" };
    editRowError = "";
    renderList();
  }
  function cancelRowEdit() { editRowId = null; editRowError = ""; renderList(); }
  function saveRowEdit() {
    if (!editRowForm.name || !editRowForm.name.trim()) { editRowError = "Needs a name."; renderList(); return; }
    if (editRowForm.amount === "" || isNaN(Number(editRowForm.amount))) { editRowError = "Needs " + cfg.amountLabel.toLowerCase() + "."; renderList(); return; }
    data.items = data.items.map(function (it) {
      if (it.id !== editRowId) return it;
      return Object.assign({}, it, editRowForm, {
        amount: Number(editRowForm.amount),
        dueDay: editRowForm.dueDay === "" ? "" : Number(editRowForm.dueDay)
      });
    });
    save();
    editRowId = null;
    editRowError = "";
    renderDynamic();
  }
  function handleDelete(id) {
    data.items = data.items.filter(function (it) { return it.id !== id; });
    data.selectedIds = (data.selectedIds || []).filter(function (sid) { return sid !== id; });
    save();
    if (editRowId === id) editRowId = null;
    renderDynamic();
  }
  function handleTogglePaid(id) {
    var item = data.items.find(function (it) { return it.id === id; });
    if (!item) return;
    item.paidOn = isCurrentlyPaid(item) ? "" : todayISO();
    save();
    renderDynamic();
  }
  function handleResetAll() {
    var btn = document.getElementById("stResetBtn");
    if (!confirmReset) {
      confirmReset = true;
      btn.textContent = "Click again to clear everything";
      btn.style.color = "#FF8A5C";
      setTimeout(function () { confirmReset = false; if (document.getElementById("stResetBtn")) { btn.textContent = "Clear this tab"; btn.style.color = "#8A919C"; } }, 4000);
      return;
    }
    data = { title: cfg.defaultTitle, budget: "", savingsGoal: "", items: [], selectedIds: [], payPeriods: [], plannedPurchases: [] };
    save();
    editRowId = null;
    confirmReset = false;
    document.getElementById("stTitle").value = data.title;
    resetForm();
    renderPayPeriodsList();
    renderDynamic();
  }

  document.getElementById("stTitle").addEventListener("input", function (e) { data.title = e.target.value; save(); });
  document.getElementById("stAddBtn").addEventListener("click", handleAdd);
  ["stName", "stDueDay", "stAmount", "stNotes"].forEach(function (id) {
    document.getElementById(id).addEventListener("keydown", function (e) { if (e.key === "Enter") handleAdd(); });
  });
  document.getElementById("stSortDate").addEventListener("click", function () {
    sortBy = "date";
    document.getElementById("stSortDate").classList.add("active");
    document.getElementById("stSortCat").classList.remove("active");
    renderList();
  });
  document.getElementById("stSortCat").addEventListener("click", function () {
    sortBy = "category";
    document.getElementById("stSortCat").classList.add("active");
    document.getElementById("stSortDate").classList.remove("active");
    renderList();
  });
  document.getElementById("stList").addEventListener("click", function (e) {
    var btn = e.target.closest("[data-action]");
    if (btn && btn.getAttribute("data-action") !== "toggle-sel") {
      var action = btn.getAttribute("data-action");
      var id = btn.getAttribute("data-id");
      if (action === "edit") startRowEdit(id);
      else if (action === "delete") handleDelete(id);
      else if (action === "save-row") saveRowEdit();
      else if (action === "cancel-row") cancelRowEdit();
      else if (action === "toggle-paid") handleTogglePaid(id);
    }
  });
  document.getElementById("stList").addEventListener("change", function (e) {
    var field = e.target.getAttribute && e.target.getAttribute("data-edit");
    if (field) editRowForm[field] = e.target.value;
    if (e.target.getAttribute && e.target.getAttribute("data-action") === "toggle-sel") toggleSelected(e.target.getAttribute("data-id"));
  });
  document.getElementById("stList").addEventListener("input", function (e) {
    var field = e.target.getAttribute && e.target.getAttribute("data-edit");
    if (field) editRowForm[field] = e.target.value;
  });
  document.getElementById("stList").addEventListener("keydown", function (e) {
    if (!e.target.getAttribute || !e.target.getAttribute("data-edit")) return;
    if (e.key === "Enter") saveRowEdit();
    if (e.key === "Escape") cancelRowEdit();
  });
  document.getElementById("stResetBtn").addEventListener("click", handleResetAll);

  if (cfg.showSavingsGoal) {
    document.getElementById("addPayPeriodBtn").addEventListener("click", handleAddPayPeriod);
    ["payDayInput", "payAmountInput"].forEach(function (id) {
      document.getElementById(id).addEventListener("keydown", function (e) { if (e.key === "Enter") handleAddPayPeriod(); });
    });
    document.getElementById("payPeriodsList").addEventListener("click", function (e) {
      var btn = e.target.closest('[data-action="delete-pay"]');
      if (btn) handleDeletePayPeriod(btn.getAttribute("data-id"));
    });
    renderPayPersonPills();
    renderPayPeriodsList();

    document.getElementById("addPlannedBtn").addEventListener("click", handleAddPlanned);
    ["plannedNameInput", "plannedAmountInput"].forEach(function (id) {
      document.getElementById(id).addEventListener("keydown", function (e) { if (e.key === "Enter") handleAddPlanned(); });
    });
    document.getElementById("plannedList").addEventListener("click", function (e) {
      var btn = e.target.closest('[data-action="delete-planned"]');
      if (btn) handleDeletePlanned(btn.getAttribute("data-id"));
    });
    renderOwnerPills();
  }

  renderPills();
  renderDynamic();
  initScrollAnims();

}

/* ---------------- travel tab (multi-trip) ---------------- */

async function renderTravelTab(root) {
  root.innerHTML = '<div class="empty-state">Loading\u2026</div>';
  var budgetData = await loadTabData("dashboard-budget-data", { items: [] });
  var totalSaved = (budgetData.items || []).filter(function (it) { return it.category === "savings"; }).reduce(function (s, it) { return s + (Number(it.amount) || 0); }, 0);

  var raw = await loadTabData("dashboard-travel-data", { trips: [], activeTripId: null });

  if (!raw.trips || raw.trips.length === 0) {
    if (raw.title || raw.startDate || raw.endDate || (raw.items && raw.items.length > 0) || raw.budget) {
      var migrated = {
        id: uid(),
        title: raw.title || "New Trip",
        startDate: raw.startDate || "",
        endDate: raw.endDate || "",
        tripDate: raw.tripDate || "",
        budget: raw.budget || "",
        savingsGoal: raw.savingsGoal || "",
        items: raw.items || [],
        selectedIds: raw.selectedIds || []
      };
      raw = { trips: [migrated], activeTripId: migrated.id };
    } else {
      var fresh = { id: uid(), title: "New Trip", startDate: "", endDate: "", tripDate: "", budget: "", savingsGoal: "", items: [], selectedIds: [] };
      raw = { trips: [fresh], activeTripId: fresh.id };
    }
    await saveTabData("dashboard-travel-data", raw);
  }
  if (!raw.activeTripId || !raw.trips.some(function (t) { return t.id === raw.activeTripId; })) {
    raw.activeTripId = raw.trips[0].id;
  }

  var sortBy = "date";
  var editRowId = null;
  var editRowForm = {};
  var editRowError = "";
  var confirmReset = false;
  var showBudgetInput = false;
  var budgetDraft = "";
  var showTripSavingsInput = false;
  var tripSavingsDraft = "";
  var confirmDeleteTrip = false;
  var countdownInterval = null;
  var activeCat = TRAVEL_CATEGORIES[0].id;

  function save() { saveTabData("dashboard-travel-data", raw); }
  function getActiveTrip() { return raw.trips.find(function (t) { return t.id === raw.activeTripId; }); }

  root.innerHTML =
    '<div class="tab-eyebrow">TRAVEL TRACKER</div>' +
    '<div class="trip-switcher" id="tripSwitcher"></div>' +
    '<div id="tripDetailRoot"></div>';

  function renderTripSwitcher() {
    var sw = document.getElementById("tripSwitcher");
    sw.innerHTML = raw.trips.map(function (t) {
      var active = t.id === raw.activeTripId;
      var style = active ? "background:#E8643A;border-color:#E8643A;color:#12151A;" : "";
      return '<button class="trip-pill" data-trip="' + t.id + '" style="' + style + '">' + escapeHtml(t.title || "Untitled trip") + "</button>";
    }).join("") + '<button class="trip-pill" id="newTripBtn" style="color:#E8643A;border-color:#E8643A;">+ New trip</button>';

    var pills = sw.querySelectorAll("[data-trip]");
    for (var i = 0; i < pills.length; i++) {
      pills[i].addEventListener("click", function (e) {
        raw.activeTripId = e.currentTarget.getAttribute("data-trip");
        save();
        renderTripSwitcher();
        renderTripDetail();
      });
    }
    document.getElementById("newTripBtn").addEventListener("click", function () {
      var t = { id: uid(), title: "New Trip", startDate: "", endDate: "", tripDate: "", budget: "", savingsGoal: "", items: [], selectedIds: [] };
      raw.trips.push(t);
      raw.activeTripId = t.id;
      save();
      renderTripSwitcher();
      renderTripDetail();
    });
  }

  function renderTripDetail() {
    // Always clear via window._countdownInterval, not the closure-local variable.
    // The local `countdownInterval` may point to a stale interval if renderTripDetail
    // has been called more than once (i.e. switching trips), so window._countdownInterval
    // is the only reliable single source of truth here.
    if (window._countdownInterval) { clearInterval(window._countdownInterval); window._countdownInterval = null; }
    countdownInterval = null;
    editRowId = null;
    confirmReset = false;
    confirmDeleteTrip = false;
    showBudgetInput = false;
    showTripSavingsInput = false;
    activeCat = TRAVEL_CATEGORIES[0].id;
    var trip = getActiveTrip();
    var detailRoot = document.getElementById("tripDetailRoot");

    detailRoot.innerHTML =
      '<header style="margin-bottom:16px;">' +
        '<input id="ttTitle" class="name-input serif" aria-label="Trip name" />' +
        '<div class="date-row"><label>Dates <input type="date" id="ttStart" /></label><span>\u2013</span><input type="date" id="ttEnd" /><span class="mono" id="ttNights"></span></div>' +
        '<div class="date-row" style="margin-top:8px;"><label style="display:flex;align-items:center;gap:6px;">Trip date <input type="date" id="ttTripDate" /></label></div>' +
      "</header>" +
      '<div id="ttCountdownWrap"></div>' +
      '<div class="card">' +
        '<div class="gauge-top"><span class="gauge-label mono">SPENT SO FAR</span><span class="mono" id="ttGaugeAmount"></span></div>' +
        '<div id="ttGaugeBody"></div>' +
      "</div>" +
      '<div class="card">' +
        '<div class="gauge-top"><span class="gauge-label mono">SAVINGS FOR THIS TRIP</span><span class="mono" id="ttSavingsAmount" style="color:#D9A441;"></span></div>' +
        '<div id="ttSavingsBody"></div>' +
        '<div style="color:#8A919C;font-size:11px;margin-top:6px;">Tracks your overall savings balance from the Budget tab against a goal for this trip.</div>' +
      "</div>" +
      '<div class="chips" id="ttChips"></div>' +
      '<div class="card">' +
        '<div class="pills" id="ttPills"></div>' +
        '<div class="form-row">' +
          '<input class="form-input" id="ttName" placeholder="What is it?" />' +
          '<div class="form-row-split">' +
            '<input class="form-input" type="date" id="ttDate" />' +
            '<input class="form-input" type="number" min="0" step="0.01" id="ttAmount" placeholder="Cost" />' +
          "</div>" +
        "</div>" +
        '<input class="form-input" id="ttNotes" placeholder="Notes (optional)" style="margin-bottom:12px;" />' +
        '<div class="form-actions"><span class="error-text" id="ttFormError"></span><button class="add-btn" id="ttAddBtn" style="background:#E8643A;">+ Add</button></div>' +
      "</div>" +
      '<div class="sort-row">' +
        '<span class="entry-count mono" id="ttEntryCount"></span>' +
        '<div style="display:flex;align-items:center;gap:8px;">' +
        '</div>' +
      "</div>" +
      '<div class="list-card" id="ttList"></div>' +
      '<div class="footer-row"><span class="footer-label">Total tracked</span><span class="footer-total mono" id="ttFooterTotal"></span></div>' +
      '<div class="bottom-row">' +
        '<button class="link-btn" id="ttDeleteTripBtn" style="color:#8A919C;">Delete this trip</button>' +
        '<button class="link-btn" id="ttResetBtn" style="color:#8A919C;">Clear this trip\u2019s entries</button>' +
      "</div>";

    document.getElementById("ttTitle").value = trip.title;
    document.getElementById("ttStart").value = trip.startDate;
    document.getElementById("ttEnd").value = trip.endDate;
    document.getElementById("ttTripDate").value = trip.tripDate || "";

    function renderNights() {
      var el = document.getElementById("ttNights");
      if (!el) return;
      if (trip.startDate && trip.endDate) {
        var diff = Math.round((new Date(trip.endDate + "T00:00:00") - new Date(trip.startDate + "T00:00:00")) / 86400000);
        el.textContent = diff > 0 ? diff + " nights" : "";
      } else {
        el.textContent = "";
      }
    }

    function renderCountdown() {
      var wrap = document.getElementById("ttCountdownWrap");
      if (!wrap) return;
      var tripDate = trip.tripDate;
      if (!tripDate) { wrap.innerHTML = ""; return; }
      var target = new Date(tripDate + "T00:00:00");
      if (isNaN(target.getTime())) { wrap.innerHTML = ""; return; }

      function pad(n) { return n < 10 ? "0" + n : String(n); }

      // Build the card shell once — tick() only updates the text nodes inside,
      // so the .card element never gets removed/re-added and the animation
      // never replays.
      wrap.innerHTML =
        '<div class="card" style="margin-bottom:16px;">' +
          '<div class="gauge-top"><span class="gauge-label mono">COUNTDOWN TO ' + escapeHtml(tripDate) + "</span></div>" +
          '<div style="display:flex;gap:8px;justify-content:center;margin-top:8px;">' +
            ['days','hrs','min','sec'].map(function (label) {
              return '<div style="flex:1;text-align:center;background:#12151A;border-radius:8px;padding:10px 4px;">' +
                '<div class="mono cd-' + label + '" style="color:#E8643A;font-size:22px;font-weight:700;">--</div>' +
                '<div style="color:#8A919C;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;">' + label + "</div>" +
              "</div>";
            }).join("") +
          "</div>" +
        "</div>";

      function tick() {
        var w2 = document.getElementById("ttCountdownWrap");
        if (!w2) { clearInterval(window._countdownInterval); window._countdownInterval = null; return; }
        var diff = target - new Date();
        if (diff <= 0) {
          w2.innerHTML = '<div class="card" style="margin-bottom:16px;text-align:center;">' +
            '<div class="gauge-label mono" style="margin-bottom:6px;">TRIP DAY</div>' +
            '<div class="serif" style="color:#E8643A;font-size:28px;">It\u2019s time! \u2708</div>' +
          "</div>";
          clearInterval(window._countdownInterval);
          window._countdownInterval = null;
          return;
        }
        var days    = Math.floor(diff / 86400000);
        var hours   = Math.floor((diff % 86400000) / 3600000);
        var minutes = Math.floor((diff % 3600000) / 60000);
        var seconds = Math.floor((diff % 60000) / 1000);
        var dEl = w2.querySelector(".cd-days");
        var hEl = w2.querySelector(".cd-hrs");
        var mEl = w2.querySelector(".cd-min");
        var sEl = w2.querySelector(".cd-sec");
        if (dEl) dEl.textContent = String(days);
        if (hEl) hEl.textContent = pad(hours);
        if (mEl) mEl.textContent = pad(minutes);
        if (sEl) sEl.textContent = pad(seconds);
      }

      tick();
      if (window._countdownInterval) clearInterval(window._countdownInterval);
      countdownInterval = setInterval(tick, 1000);
      window._countdownInterval = countdownInterval;
    }

    function renderGauge() {
      var totalSpent = trip.items.reduce(function (s, it) { return s + (Number(it.amount) || 0); }, 0);
      var budgetNum = Number(trip.budget) || 0;
      var amountEl = document.getElementById("ttGaugeAmount");
      var bodyEl = document.getElementById("ttGaugeBody");
      if (budgetNum > 0) {
        var pct = Math.min(100, (totalSpent / budgetNum) * 100);
        var over = totalSpent > budgetNum;
        amountEl.style.color = over ? "#FF8A5C" : "#E8643A";
        amountEl.textContent = formatCurrency(totalSpent) + " of " + formatCurrency(budgetNum) + (over ? " \u00B7 " + formatCurrency(totalSpent - budgetNum) + " over" : "");
        var grad = over ? "linear-gradient(90deg,#8a2e18,#E8643A)" : "linear-gradient(90deg,#E8643A,#FF8A5Ccc)";
        bodyEl.innerHTML = '<div class="gauge-track"><div class="gauge-fill" style="width:' + pct + "%;background:" + grad + ';box-shadow:0 0 14px #E8643A55;"></div></div>';
      } else {
        amountEl.style.color = "#E8643A";
        amountEl.textContent = formatCurrency(totalSpent);
        if (showBudgetInput) {
          bodyEl.innerHTML = '<div class="row-gap"><input id="ttBudgetDraft" class="small-input" type="number" min="0" placeholder="Trip budget" value="' + escapeHtml(budgetDraft) + '" /><button class="small-btn" id="ttSetBudget" style="background:#E8643A;">Set</button></div>';
          var bd = document.getElementById("ttBudgetDraft");
          bd.addEventListener("input", function (e) { budgetDraft = e.target.value; });
          bd.addEventListener("keydown", function (e) { if (e.key === "Enter") commitBudget(); });
          bd.focus();
          document.getElementById("ttSetBudget").addEventListener("click", commitBudget);
        } else {
          bodyEl.innerHTML = '<button class="link-btn" id="ttShowBudget" style="color:#8A919C;">Set a trip budget to track against</button>';
          document.getElementById("ttShowBudget").addEventListener("click", function () { showBudgetInput = true; renderGauge(); });
        }
      }
    }
    function commitBudget() { trip.budget = budgetDraft; showBudgetInput = false; save(); renderGauge(); }

    function renderSavingsGauge() {
      var goalNum = Number(trip.savingsGoal) || 0;
      var amountEl = document.getElementById("ttSavingsAmount");
      var bodyEl = document.getElementById("ttSavingsBody");
      if (!amountEl || !bodyEl) return;
      if (showTripSavingsInput) {
        amountEl.textContent = goalNum > 0 ? formatCurrency(totalSaved) + " of " + formatCurrency(goalNum) : formatCurrency(totalSaved);
        bodyEl.innerHTML = '<div class="row-gap"><input id="ttSavingsDraft" class="small-input" type="number" min="0" placeholder="Savings goal" value="' + escapeHtml(tripSavingsDraft) + '" /><button class="small-btn" id="ttSetSavings" style="background:#D9A441;">Set</button>' + (goalNum > 0 ? '<button class="link-btn" id="ttCancelSavings" style="color:#8A919C;">Cancel</button>' : "") + '</div>';
        var sd = document.getElementById("ttSavingsDraft");
        sd.addEventListener("input", function (e) { tripSavingsDraft = e.target.value; });
        sd.addEventListener("keydown", function (e) { if (e.key === "Enter") commitTripSavings(); if (e.key === "Escape") { showTripSavingsInput = false; renderSavingsGauge(); } });
        sd.focus();
        document.getElementById("ttSetSavings").addEventListener("click", commitTripSavings);
        if (goalNum > 0) document.getElementById("ttCancelSavings").addEventListener("click", function () { showTripSavingsInput = false; renderSavingsGauge(); });
      } else if (goalNum > 0) {
        var pct = Math.min(100, (totalSaved / goalNum) * 100);
        amountEl.textContent = formatCurrency(totalSaved) + " of " + formatCurrency(goalNum);
        bodyEl.innerHTML = '<div class="gauge-track"><div class="gauge-fill" style="width:' + pct + '%;background:linear-gradient(90deg,#D9A441,#D9A441cc);box-shadow:0 0 14px #D9A44155;"></div></div><button class="link-btn" id="ttEditSavings" style="color:#8A919C;margin-top:6px;">Edit savings goal</button>';
        document.getElementById("ttEditSavings").addEventListener("click", function () { tripSavingsDraft = String(goalNum); showTripSavingsInput = true; renderSavingsGauge(); });
      } else {
        amountEl.textContent = formatCurrency(totalSaved);
        bodyEl.innerHTML = '<button class="link-btn" id="ttShowSavings" style="color:#8A919C;">Set a savings goal for this trip</button>';
        document.getElementById("ttShowSavings").addEventListener("click", function () { tripSavingsDraft = ""; showTripSavingsInput = true; renderSavingsGauge(); });
      }
    }
    function commitTripSavings() {
      if (tripSavingsDraft === "" || isNaN(Number(tripSavingsDraft))) { showTripSavingsInput = false; renderSavingsGauge(); return; }
      trip.savingsGoal = tripSavingsDraft;
      showTripSavingsInput = false;
      save();
      renderSavingsGauge();
    }

    function renderChips() {
      var totals = TRAVEL_CATEGORIES.map(function (cat, i) {
        var total = trip.items.filter(function (it) { return it.category === cat.id; }).reduce(function (s, it) { return s + (Number(it.amount) || 0); }, 0);
        return Object.assign({}, cat, { total: total, idx: i });
      }).filter(function (c) { return c.total > 0; });
      document.getElementById("ttChips").innerHTML = totals.map(function (cat) {
        return '<span class="chip"><span class="chip-num" style="color:' + cat.color + '">' + numLabel(cat.idx) + '</span> ' + escapeHtml(cat.label) + ' <span class="mono" style="color:#E8643A;">' + formatCurrency(cat.total) + "</span></span>";
      }).join("");
    }

    function renderPills() {
      document.getElementById("ttPills").innerHTML = TRAVEL_CATEGORIES.map(function (cat) {
        var active = cat.id === activeCat;
        return '<button class="pill" data-cat="' + cat.id + '" style="background:' + (active ? cat.color : "transparent") + ";border-color:" + cat.color + ";color:" + (active ? "#12151A" : cat.color) + ';">' + cat.glyph + " " + escapeHtml(cat.label) + "</button>";
      }).join("");
      var pills = document.getElementById("ttPills").querySelectorAll(".pill");
      for (var i = 0; i < pills.length; i++) {
        pills[i].addEventListener("click", function (e) { activeCat = e.currentTarget.getAttribute("data-cat"); renderPills(); });
      }
    }

    function getSortedItems() {
      var copy = trip.items.slice();
      if (sortBy === "date") {
        copy.sort(function (a, b) { return (a.date || "9999").localeCompare(b.date || "9999"); });
      } else {
        var order = TRAVEL_CATEGORIES.map(function (c) { return c.id; });
        copy.sort(function (a, b) {
          var d = order.indexOf(a.category) - order.indexOf(b.category);
          if (d !== 0) return d;
          return (a.date || "9999").localeCompare(b.date || "9999");
        });
      }
      return copy;
    }

    function renderList() {
      document.getElementById("ttEntryCount").textContent = trip.items.length + (trip.items.length === 1 ? " entry" : " entries");
      var listEl = document.getElementById("ttList");
      if (sorted.length === 0) {
        listEl.innerHTML = '<div class="empty-state">Your ledger is empty. Add a flight, a stay, an activity \u2014 anything with a price.</div>';
        return;
      }
      listEl.innerHTML = sorted.map(function (item) {
        var cat = categoryById(TRAVEL_CATEGORIES, item.category);
        if (item.id === editRowId) {
          var f = editRowForm;
          return '<div class="item-row"><div class="item-edit">' +
            '<div class="edit-line">' +
            '<select class="edit-select" data-edit="category">' + TRAVEL_CATEGORIES.map(function (c) { return '<option value="' + c.id + '"' + (c.id === f.category ? " selected" : "") + ">" + escapeHtml(c.label) + "</option>"; }).join("") + "</select>" +
            '<input class="edit-input grow" data-edit="name" placeholder="Name" value="' + escapeHtml(f.name) + '" />' +
            '<input class="edit-input date" type="date" data-edit="date" value="' + escapeHtml(f.date) + '" />' +
            "</div>" +
            '<div class="edit-line">' +
            '<input class="edit-input amt" type="number" min="0" step="0.01" data-edit="amount" placeholder="Cost" value="' + escapeHtml(f.amount) + '" />' +
            '<input class="edit-input grow" data-edit="notes" placeholder="Notes" value="' + escapeHtml(f.notes) + '" />' +
            (editRowError ? '<span class="error-text">' + escapeHtml(editRowError) + "</span>" : "") +
            '<button class="icon-btn" data-action="save-row" style="color:#E8643A;">\u2713</button>' +
            '<button class="icon-btn" data-action="cancel-row">\u2715</button>' +
            "</div></div></div>";
        }
          '<span class="item-bar" style="background:' + cat.color + ';"></span>' +
          '<span class="item-glyph" style="color:' + cat.color + ';">' + cat.glyph + "</span>" +
          '<div class="item-main"><div class="item-name">' + escapeHtml(item.name) + "</div>" +
          '<div class="item-sub">' + formatDateShort(item.date) + (item.notes ? " \u00B7 " + escapeHtml(item.notes) : "") + "</div></div>" +
          '<div class="item-amount mono" style="color:#E8643A;">' + formatCurrency(item.amount) + "</div>" +
          '<div class="item-actions"><button class="icon-btn" data-action="edit" data-id="' + item.id + '">\u270E</button>' +
          '<button class="icon-btn" data-action="delete" data-id="' + item.id + '">\u2715</button></div>' +
          "</div></div>";
      }).join("");
    }

    function renderFooter() {
      var totalSpent = trip.items.reduce(function (s, it) { return s + (Number(it.amount) || 0); }, 0);
      document.getElementById("ttFooterTotal").textContent = formatCurrency(totalSpent);
    }

    function renderDynamic() {
      renderGauge();
      renderSavingsGauge();
      renderChips();
      renderList();
      renderFooter();
      renderCountdown();
    }

    function resetForm() {
      document.getElementById("ttName").value = "";
      document.getElementById("ttDate").value = "";
      document.getElementById("ttAmount").value = "";
      document.getElementById("ttNotes").value = "";
      document.getElementById("ttFormError").textContent = "";
    }

    function handleAdd() {
      var name = document.getElementById("ttName").value.trim();
      var dateVal = document.getElementById("ttDate").value;
      var amountVal = document.getElementById("ttAmount").value;
      var notesVal = document.getElementById("ttNotes").value;
      var errEl = document.getElementById("ttFormError");
      if (!name) { errEl.textContent = "Give it a name first."; return; }
      if (amountVal === "" || isNaN(Number(amountVal))) { errEl.textContent = "Add a cost."; return; }
      errEl.textContent = "";
      trip.items.push({ id: uid(), category: activeCat, name: name, date: dateVal, amount: Number(amountVal), notes: notesVal });
      save();
      resetForm();
      renderDynamic();
    }

    function startRowEdit(id) {
      var item = trip.items.find(function (it) { return it.id === id; });
      if (!item) return;
      editRowId = id;
      editRowForm = { category: item.category, name: item.name, date: item.date, amount: String(item.amount), notes: item.notes || "" };
      editRowError = "";
      renderList();
    }
    function cancelRowEdit() { editRowId = null; editRowError = ""; renderList(); }
    function saveRowEdit() {
      if (!editRowForm.name || !editRowForm.name.trim()) { editRowError = "Needs a name."; renderList(); return; }
      if (editRowForm.amount === "" || isNaN(Number(editRowForm.amount))) { editRowError = "Needs a cost."; renderList(); return; }
      trip.items = trip.items.map(function (it) {
        if (it.id !== editRowId) return it;
        return Object.assign({}, it, editRowForm, { amount: Number(editRowForm.amount) });
      });
      save();
      editRowId = null;
      editRowError = "";
      renderDynamic();
    }
    function handleDelete(id) {
      trip.items = trip.items.filter(function (it) { return it.id !== id; });
      save();
      if (editRowId === id) editRowId = null;
      renderDynamic();
    }
    function handleResetAll() {
      var btn = document.getElementById("ttResetBtn");
      if (!confirmReset) {
        confirmReset = true;
        btn.textContent = "Click again to clear everything";
        btn.style.color = "#FF8A5C";
        setTimeout(function () { confirmReset = false; if (document.getElementById("ttResetBtn")) { btn.textContent = "Clear this trip\u2019s entries"; btn.style.color = "#8A919C"; } }, 4000);
        return;
      }
      trip.items = [];
      trip.budget = "";
      trip.savingsGoal = "";
      save();
      editRowId = null;
      confirmReset = false;
      renderDynamic();
    }
    function handleDeleteTrip() {
      var btn = document.getElementById("ttDeleteTripBtn");
      if (!confirmDeleteTrip) {
        confirmDeleteTrip = true;
        btn.textContent = "Click again to delete this trip";
        btn.style.color = "#FF8A5C";
        setTimeout(function () { confirmDeleteTrip = false; if (document.getElementById("ttDeleteTripBtn")) { btn.textContent = "Delete this trip"; btn.style.color = "#8A919C"; } }, 4000);
        return;
      }
      raw.trips = raw.trips.filter(function (t) { return t.id !== trip.id; });
      if (raw.trips.length === 0) {
        var fresh2 = { id: uid(), title: "New Trip", startDate: "", endDate: "", tripDate: "", budget: "", savingsGoal: "", items: [], selectedIds: [] };
        raw.trips.push(fresh2);
      }
      raw.activeTripId = raw.trips[0].id;
      save();
      renderTripSwitcher();
      renderTripDetail();
    }

    document.getElementById("ttTitle").addEventListener("input", function (e) { trip.title = e.target.value; save(); renderTripSwitcher(); });
    document.getElementById("ttStart").addEventListener("input", function (e) { trip.startDate = e.target.value; save(); renderNights(); });
    document.getElementById("ttEnd").addEventListener("input", function (e) { trip.endDate = e.target.value; save(); renderNights(); });
    document.getElementById("ttTripDate").addEventListener("input", function (e) { trip.tripDate = e.target.value; save(); renderCountdown(); });
    document.getElementById("ttAddBtn").addEventListener("click", handleAdd);
    ["ttName", "ttAmount", "ttNotes"].forEach(function (id) {
      document.getElementById(id).addEventListener("keydown", function (e) { if (e.key === "Enter") handleAdd(); });
    });
    document.getElementById("ttSortDate").addEventListener("click", function () {
      sortBy = "date";
      document.getElementById("ttSortDate").classList.add("active");
      document.getElementById("ttSortCat").classList.remove("active");
      renderList();
    });
    document.getElementById("ttSortCat").addEventListener("click", function () {
      sortBy = "category";
      document.getElementById("ttSortCat").classList.add("active");
      document.getElementById("ttSortDate").classList.remove("active");
      renderList();
    });
    document.getElementById("ttList").addEventListener("click", function (e) {
      var btn = e.target.closest("[data-action]");
      if (!btn) return;
      var action = btn.getAttribute("data-action");
      var id = btn.getAttribute("data-id");
      if (action === "edit") startRowEdit(id);
      else if (action === "delete") handleDelete(id);
      else if (action === "save-row") saveRowEdit();
      else if (action === "cancel-row") cancelRowEdit();
    });
    document.getElementById("ttList").addEventListener("input", function (e) {
      var field = e.target.getAttribute && e.target.getAttribute("data-edit");
      if (field) editRowForm[field] = e.target.value;
    });
    document.getElementById("ttList").addEventListener("change", function (e) {
      var field = e.target.getAttribute && e.target.getAttribute("data-edit");
      if (field) editRowForm[field] = e.target.value;
    });
    document.getElementById("ttList").addEventListener("keydown", function (e) {
      if (!e.target.getAttribute || !e.target.getAttribute("data-edit")) return;
      if (e.key === "Enter") saveRowEdit();
      if (e.key === "Escape") cancelRowEdit();
    });
    document.getElementById("ttResetBtn").addEventListener("click", handleResetAll);
    document.getElementById("ttDeleteTripBtn").addEventListener("click", handleDeleteTrip);

    renderNights();
    renderPills();
    renderDynamic();
    initScrollAnims();

  }

  renderTripSwitcher();
  renderTripDetail();
}

/* ---------------- workouts tab ---------------- */

async function renderWorkoutsTab(root) {
  root.innerHTML = '<div class="empty-state">Loading\u2026</div>';
  var accent = "#3DBFC4";
  var defaultData = { weeklyGoal: "", items: [], bodyWeightLog: [] };
  var data = await loadTabData("dashboard-workouts-data", defaultData);

  // migrate any old-shape items (liftWeight/sets/reps directly on the item)
  // into the new shape (a session with a nested lifts array)
  var migratedAny = false;
  data.items = (data.items || []).map(function (it) {
    if (it.lifts) return it;
    migratedAny = true;
    var hasOldLiftFields = (it.liftWeight !== "" && it.liftWeight != null) || (it.sets !== "" && it.sets != null) || (it.reps !== "" && it.reps != null);
    var lifts = [];
    if (hasOldLiftFields) {
      lifts.push({
        id: uid(),
        name: it.name,
        weight: (it.liftWeight === "" || it.liftWeight == null) ? "" : it.liftWeight,
        sets: (it.sets === "" || it.sets == null) ? "" : it.sets,
        reps: (it.reps === "" || it.reps == null) ? "" : it.reps
      });
    }
    return { id: it.id, category: it.category, name: it.name, date: it.date, duration: it.duration, notes: it.notes, lifts: lifts };
  });

  var sortBy = "date";
  var activeCat = "strength";
  var editRowId = null;
  var editRowForm = {};
  var editRowError = "";
  var confirmReset = false;
  var showGoalInput = false;
  var goalDraft = "";
  var expandedIds = new Set();
  var editingLiftItemId = null;
  var editingLiftId = null;
  var editingLiftForm = {};

  function save() { saveTabData("dashboard-workouts-data", data); }
  if (migratedAny) save();

  root.innerHTML =
    '<div class="tab-eyebrow">WORKOUT PLANNER</div>' +
    '<header style="margin-bottom:20px;"><h2 class="serif" style="color:#EDEAE3;font-size:30px;margin:0 0 4px;">Workouts</h2><div class="mono" id="wkStreak" style="color:' + accent + ';font-size:12px;"></div></header>' +
    '<div class="card">' +
      '<div class="weight-row"><span class="gauge-label mono">CURRENT WEIGHT</span></div>' +
      '<div class="weight-current mono" id="wkCurrentWeight" style="color:' + accent + ';"></div>' +
      '<div class="row-gap" style="margin-top:10px;"><input class="small-input" type="number" min="0" step="0.1" id="wkWeightDraft" placeholder="Log weight (lbs)" /><button class="small-btn" id="wkLogWeightBtn" style="background:' + accent + ';">Log</button></div>' +
      '<div id="wkWeightLog" style="margin-top:10px;"></div>' +
    "</div>" +
    '<div class="card"><div class="gauge-top"><span class="gauge-label mono">THIS WEEK</span><span class="mono" id="wkGaugeAmount"></span></div><div id="wkGaugeBody"></div></div>' +
    '<div class="chips" id="wkChips"></div>' +
    '<div class="card">' +
      '<div class="pills" id="wkPills"></div>' +
      '<div class="form-row">' +
        '<input class="form-input" id="wkName" placeholder="Type of workout, e.g. Leg Day" />' +
        '<div class="form-row-split"><input class="form-input" type="date" id="wkDate" /><input class="form-input" type="number" min="0" id="wkDuration" placeholder="Minutes (optional)" /></div>' +
      "</div>" +
      '<input class="form-input" id="wkNotes" placeholder="Notes (optional)" style="margin-bottom:12px;" />' +
      '<div class="form-actions"><span class="error-text" id="wkFormError"></span><button class="add-btn" id="wkAddBtn" style="background:' + accent + ';">+ Add</button></div>' +
    "</div>" +
    '<div class="list-card" id="wkList"></div>' +
    '<div class="footer-row"><span class="footer-label">Total logged</span><span class="footer-total mono" id="wkFooterTotal"></span></div>' +
    '<div class="bottom-row"><button class="link-btn" id="wkResetBtn" style="color:#8A919C;">Clear this tab</button></div>';

  function weekStart() { return addDaysISO(todayISO(), -6); }

  function renderStreak() {
    var dateSet = new Set(data.items.filter(function (it) { return it.date; }).map(function (it) { return it.date; }));
    var streak = computeStreak(dateSet);
    document.getElementById("wkStreak").textContent = streak > 0 ? streak + " day streak" : "";
  }

  function renderWeight() {
    var sorted = (data.bodyWeightLog || []).slice().sort(function (a, b) { return (b.date || "").localeCompare(a.date || ""); });
    var current = sorted[0];
    document.getElementById("wkCurrentWeight").textContent = current ? current.weight + " lbs" : "Not logged yet";
    var logEl = document.getElementById("wkWeightLog");
    if (sorted.length === 0) { logEl.innerHTML = ""; return; }
    logEl.innerHTML = sorted.slice(0, 5).map(function (w) {
      return '<div class="weight-log-row"><span style="color:#8A919C;">' + formatDateShort(w.date) + '</span><span class="mono" style="color:' + accent + ';">' + w.weight + " lbs</span><button class=\"icon-btn\" data-action=\"delete-weight\" data-id=\"" + w.id + "\">\u2715</button></div>";
    }).join("");
  }

  function handleLogWeight() {
    var val = document.getElementById("wkWeightDraft").value;
    if (val === "" || isNaN(Number(val))) return;
    if (!data.bodyWeightLog) data.bodyWeightLog = [];
    data.bodyWeightLog.push({ id: uid(), date: todayISO(), weight: Number(val) });
    save();
    document.getElementById("wkWeightDraft").value = "";
    renderWeight();
  }
  function handleDeleteWeight(id) {
    data.bodyWeightLog = (data.bodyWeightLog || []).filter(function (w) { return w.id !== id; });
    save();
    renderWeight();
  }

  function renderGauge() {
    var ws = weekStart();
    var thisWeek = data.items.filter(function (it) { return it.date && it.date >= ws && it.date <= todayISO(); });
    var goalNum = Number(data.weeklyGoal) || 0;
    var amountEl = document.getElementById("wkGaugeAmount");
    var bodyEl = document.getElementById("wkGaugeBody");
    amountEl.style.color = accent;
    if (goalNum > 0) {
      var pct = Math.min(100, (thisWeek.length / goalNum) * 100);
      amountEl.textContent = thisWeek.length + " of " + goalNum + " workouts";
      bodyEl.innerHTML = '<div class="gauge-track"><div class="gauge-fill" style="width:' + pct + "%;background:linear-gradient(90deg," + accent + "," + accent + 'cc);box-shadow:0 0 14px ' + accent + '55;"></div></div>';
    } else {
      amountEl.textContent = thisWeek.length + " workouts";
      if (showGoalInput) {
        bodyEl.innerHTML = '<div class="row-gap"><input id="wkGoalDraft" class="small-input" type="number" min="0" placeholder="Workouts per week" value="' + escapeHtml(goalDraft) + '" /><button class="small-btn" id="wkSetGoal" style="background:' + accent + ';">Set</button></div>';
        var gd = document.getElementById("wkGoalDraft");
        gd.addEventListener("input", function (e) { goalDraft = e.target.value; });
        gd.addEventListener("keydown", function (e) { if (e.key === "Enter") commitGoal(); });
        gd.focus();
        document.getElementById("wkSetGoal").addEventListener("click", commitGoal);
      } else {
        bodyEl.innerHTML = '<button class="link-btn" id="wkShowGoal" style="color:#8A919C;">Set a weekly goal to track against</button>';
        document.getElementById("wkShowGoal").addEventListener("click", function () { showGoalInput = true; renderGauge(); });
      }
    }
  }
  function commitGoal() { data.weeklyGoal = goalDraft; showGoalInput = false; save(); renderGauge(); }

  function renderChips() {
    var counts = WORKOUT_CATEGORIES.map(function (cat, i) {
      return Object.assign({}, cat, { count: data.items.filter(function (it) { return it.category === cat.id; }).length, idx: i });
    }).filter(function (c) { return c.count > 0; });
    document.getElementById("wkChips").innerHTML = counts.map(function (cat) {
      return '<span class="chip"><span class="chip-num" style="color:' + cat.color + '">' + numLabel(cat.idx) + '</span> ' + escapeHtml(cat.label) + ' <span class="mono" style="color:' + accent + ';">\u00D7 ' + cat.count + "</span></span>";
    }).join("");
  }

  function renderPills() {
    document.getElementById("wkPills").innerHTML = WORKOUT_CATEGORIES.map(function (cat) {
      var active = cat.id === activeCat;
      return '<button class="pill" data-cat="' + cat.id + '" style="background:' + (active ? cat.color : "transparent") + ";border-color:" + cat.color + ";color:" + (active ? "#12151A" : cat.color) + ';">' + cat.glyph + " " + escapeHtml(cat.label) + "</button>";
    }).join("");
    var pills = document.getElementById("wkPills").querySelectorAll(".pill");
    for (var i = 0; i < pills.length; i++) {
      pills[i].addEventListener("click", function (e) { activeCat = e.currentTarget.getAttribute("data-cat"); renderPills(); });
    }
  }

  function getSortedItems() {
    var copy = data.items.slice();
    if (sortBy === "date") {
      copy.sort(function (a, b) { return (b.date || "0000").localeCompare(a.date || "0000"); });
    } else {
      var order = WORKOUT_CATEGORIES.map(function (c) { return c.id; });
      copy.sort(function (a, b) {
